<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El-Fish Web — Fish Breeding Tank</title>
<style>
  /* ---- DOS/VGA era chrome ---------------------------------------- */
  :root {
    --bezel: #c0c0c0;
    --bezel-hi: #ffffff;
    --bezel-lo: #5c5c5c;
    --panel: #a8a8a8;
    --ink: #101010;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #20242c;
    color: var(--ink);
    font-family: "Perfect DOS VGA", "Px437", "Fixedsys", "Lucida Console", monospace;
    font-size: 14px;
    -webkit-font-smoothing: none;
    user-select: none;
  }
  #app {
    max-width: 980px;
    margin: 12px auto;
    padding: 6px;
    background: var(--bezel);
    border-top: 3px solid var(--bezel-hi);
    border-left: 3px solid var(--bezel-hi);
    border-right: 3px solid var(--bezel-lo);
    border-bottom: 3px solid var(--bezel-lo);
  }
  #titlebar {
    background: linear-gradient(#000080, #1040a0);
    color: #fff;
    padding: 4px 8px;
    font-weight: bold;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  #titlebar .ver { color: #9fc7ff; font-weight: normal; }
  #tankwrap {
    margin: 6px;
    border-top: 3px solid var(--bezel-lo);
    border-left: 3px solid var(--bezel-lo);
    border-right: 3px solid var(--bezel-hi);
    border-bottom: 3px solid var(--bezel-hi);
    background: #000;
    line-height: 0;
  }
  canvas#tank {
    width: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 6px 6px 6px;
    align-items: stretch;
  }
  button {
    font: inherit;
    padding: 5px 12px;
    background: var(--bezel);
    color: var(--ink);
    border-top: 2px solid var(--bezel-hi);
    border-left: 2px solid var(--bezel-hi);
    border-right: 2px solid var(--bezel-lo);
    border-bottom: 2px solid var(--bezel-lo);
    cursor: pointer;
  }
  button:active {
    border-top: 2px solid var(--bezel-lo);
    border-left: 2px solid var(--bezel-lo);
    border-right: 2px solid var(--bezel-hi);
    border-bottom: 2px solid var(--bezel-hi);
  }
  button:disabled { color: #707070; cursor: default; }
  select {
    font: inherit;
    padding: 5px 8px;
    background: var(--bezel);
    color: var(--ink);
    border-top: 2px solid var(--bezel-lo);
    border-left: 2px solid var(--bezel-lo);
    border-right: 2px solid var(--bezel-hi);
    border-bottom: 2px solid var(--bezel-hi);
    cursor: pointer;
  }
  #status {
    margin: 0 6px 6px 6px;
    padding: 4px 8px;
    background: #000;
    color: #54fc54;
    min-height: 22px;
    border-top: 2px solid var(--bezel-lo);
    border-left: 2px solid var(--bezel-lo);
    border-right: 2px solid var(--bezel-hi);
    border-bottom: 2px solid var(--bezel-hi);
    white-space: pre-wrap;
  }
  #infopanel {
    display: flex;
    gap: 6px;
    margin: 0 6px 6px 6px;
  }
  .fishcard {
    flex: 1;
    background: var(--panel);
    padding: 6px;
    border-top: 2px solid var(--bezel-lo);
    border-left: 2px solid var(--bezel-lo);
    border-right: 2px solid var(--bezel-hi);
    border-bottom: 2px solid var(--bezel-hi);
    min-height: 96px;
    font-size: 12px;
    line-height: 1.4;
  }
  .fishcard canvas {
    image-rendering: pixelated;
    background: #04182c;
    float: right;
    margin-left: 6px;
    border: 1px solid var(--bezel-lo);
  }
  .fishcard h3 { margin: 0 0 2px 0; font-size: 13px; }
  .fishcard .dim { color: #404040; }
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <span>&#9822; EL-FISH WEB &mdash; STOCKED TANK</span>
    <span class="ver">an homage to El-Fish (1993)</span>
  </div>

  <div id="tankwrap"><canvas id="tank" width="640" height="480"></canvas></div>

  <div id="controls">
    <button id="btnNew" title="Go fishing: catch a brand new random fish">Go Fishing</button>
    <button id="btnBreed" title="Select two fish (click them), then breed" disabled>Breed Selected</button>
    <button id="btnFeed" title="Drop food into the tank">Feed</button>
    <select id="critterSel" title="Choose a critter to add">
      <option value="snail">Snail</option>
      <option value="shrimp">Shrimp</option>
      <option value="clam">Clam</option>
      <option value="crayfish">Crayfish</option>
    </select>
    <button id="btnCritter" title="Add the chosen critter to the tank (right-click a critter to release it)">Add Critter</button>
    <button id="btnRelease" title="Release the selected fish back into the wild" disabled>Release</button>
    <button id="btnSave" title="Save tank to this browser">Save Tank</button>
    <button id="btnLoad" title="Load previously saved tank">Load Tank</button>
  </div>

  <div id="infopanel">
    <div class="fishcard" id="card0"><h3>Fish A</h3><span class="dim">Click a fish in the tank to select it.</span></div>
    <div class="fishcard" id="card1"><h3>Fish B</h3><span class="dim">Click a second fish to enable breeding.</span></div>
  </div>

  <div id="status">Welcome to El-Fish Web. Go fishing to stock your tank, then breed your catches.</div>
</div>

<script>
"use strict";
/* =====================================================================
   EL-FISH WEB — an homage to the 1993 Maxis/AnimaTek "software toy".
   All graphics are procedurally generated pixel art in the spirit of
   the original 640x480 VGA look. No original game assets are used.
   ===================================================================== */

// ---------------------------------------------------------------------
// Small deterministic PRNG (mulberry32) so fish render reproducibly.
// ---------------------------------------------------------------------
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = mulberry32((Date.now() ^ 0x5eed) >>> 0);
function rand()        { return rng(); }
function randInt(n)    { return Math.floor(rng() * n); }
function randRange(a, b) { return a + rng() * (b - a); }
function pick(arr)     { return arr[randInt(arr.length)]; }

// Coordinate-hash noise for spots/gravel (deterministic per fish seed).
function hash2(x, y, seed) {
  let h = (x * 374761393 + y * 668265263 + seed * 2246822519) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
}

// ---------------------------------------------------------------------
// VGA-flavoured palette. Fish body colors come from FISH_COLORS.
// ---------------------------------------------------------------------
const FISH_COLORS = [
  [252, 84,  84],  // coral red
  [252, 168, 68],  // orange
  [252, 232, 100], // yellow
  [120, 220, 96],  // green
  [72,  200, 200], // teal
  [96,  144, 252], // blue
  [160, 108, 252], // violet
  [252, 128, 200], // pink
  [220, 220, 228], // silver
  [148, 108, 68],  // brown
  [40,  48,  72],  // midnight
  [252, 252, 252], // white
];
const COLOR_NAMES = ["Coral","Orange","Gold","Green","Teal","Blue","Violet","Pink","Silver","Brown","Midnight","White"];
const TAIL_NAMES    = ["Fan", "Forked", "Spade", "Veil"];
const PATTERN_NAMES = ["Plain", "Banded", "Striped", "Spotted", "Shaded"];

function shade(rgb, f) {
  return [
    Math.max(0, Math.min(255, Math.round(rgb[0] * f))),
    Math.max(0, Math.min(255, Math.round(rgb[1] * f))),
    Math.max(0, Math.min(255, Math.round(rgb[2] * f))),
  ];
}
function css(rgb) { return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; }

// 2x2 Bayer matrix for ordered dithering — the heart of the VGA look.
const BAYER = [[0.25, 0.75], [1.0, 0.5]];
// 4x4 Bayer matrix (normalized 0..1) for the smoother fish shading ramp.
const BAYER4 = [
  [ 0,  8,  2, 10],
  [12,  4, 14,  6],
  [ 3, 11,  1,  9],
  [15,  7, 13,  5],
].map(row => row.map(v => (v + 0.5) / 16));

// ---------------------------------------------------------------------
// Genome: every visible trait of a fish is a gene. Breeding does a
// per-gene crossover between two parents plus a small mutation chance.
// ---------------------------------------------------------------------
const GENE_SPEC = {
  bodyLen:    { min: 22, max: 44, int: true },   // pixels
  bodyHeight: { min: 0.30, max: 0.62 },          // ratio of length
  shape:      { min: 0, max: 1 },                // 0 sleek .. 1 round
  tailType:   { min: 0, max: 3, int: true },
  tailSize:   { min: 0.5, max: 1.4 },
  dorsalSize: { min: 0.2, max: 1.2 },
  finSize:    { min: 0.4, max: 1.2 },
  eyeSize:    { min: 1, max: 3, int: true },
  baseColor:  { min: 0, max: FISH_COLORS.length - 1, int: true },
  accentColor:{ min: 0, max: FISH_COLORS.length - 1, int: true },
  finColor:   { min: 0, max: FISH_COLORS.length - 1, int: true },
  pattern:    { min: 0, max: 4, int: true },
  patternFreq:{ min: 2, max: 7, int: true },
  speed:      { min: 0.5, max: 1.6 },
};

function randomGenome() {
  const g = {};
  for (const [k, s] of Object.entries(GENE_SPEC)) {
    const v = randRange(s.min, s.max);
    g[k] = s.int ? Math.round(v) : v;
  }
  g.seed = randInt(0x7fffffff);
  return g;
}

function breedGenomes(a, b) {
  const g = {};
  for (const [k, s] of Object.entries(GENE_SPEC)) {
    g[k] = rand() < 0.5 ? a[k] : b[k];          // crossover
    if (rand() < 0.12) {                        // mutation
      const span = (s.max - s.min) * 0.35;
      g[k] = Math.max(s.min, Math.min(s.max, g[k] + randRange(-span, span)));
    }
    if (s.int) g[k] = Math.round(g[k]);
  }
  g.seed = randInt(0x7fffffff);
  return g;
}

// Fish name generator — vaguely aquatic nonsense, like pet fish deserve.
const SYL_A = ["Bub", "Fin", "Gil", "Mo", "Splash", "Neb", "Aqua", "Pearl", "Coral", "Zag", "Blu", "Glim"];
const SYL_B = ["bles", "ster", "bert", "lina", "beau", "ula", "rio", "wig", "let", "mer", "dora", "kin"];
function fishName() { return pick(SYL_A) + pick(SYL_B); }

// ---------------------------------------------------------------------
// Sprite renderer. Like the original's animation compiler, we pre-render
// a strip of frames per fish (tail sweep phases) into offscreen canvases.
// ---------------------------------------------------------------------
const N_FRAMES = 8;

// Body silhouette along t in [0,1] (0=tail joint, 1=nose). Dorsal and
// ventral profiles differ: the back arches, the belly is rounder, both
// pinch into a caudal peduncle at the tail and taper at the snout.
function topProfile(t, shapeGene) {
  const arc  = Math.pow(Math.sin(Math.PI * Math.min(1, t * 0.9 + 0.08)), 0.95 - shapeGene * 0.4);
  const ped  = 0.24 + 0.76 * Math.min(1, t * 3.2);      // peduncle pinch
  const nose = t > 0.92 ? 1 - (t - 0.92) * 4 : 1;       // snout taper
  return Math.max(0.08, arc * ped * Math.max(0.55, nose));
}
function botProfile(t, shapeGene) {
  const arc = Math.pow(Math.sin(Math.PI * Math.min(1, t * 0.95 + 0.05)), 0.68 - shapeGene * 0.22);
  const ped = 0.22 + 0.78 * Math.min(1, t * 3.0);
  return Math.max(0.08, arc * ped * 0.92);
}

// Sprites render at 2x the genome's nominal pixel size for the 640x480 mode;
// genome values keep their original meaning so saved tanks stay compatible.
const SPRITE_SCALE = 2;

function renderFishFrames(g) {
  const bodyLen = g.bodyLen * SPRITE_SCALE;
  const maxH = Math.max(5, Math.round(bodyLen * g.bodyHeight / 2)); // dorsal half-height
  const tailLen = Math.max(6, Math.round(bodyLen * 0.36 * g.tailSize));
  const dorsalH = Math.max(2, Math.round(maxH * g.dorsalSize));
  const ventH   = Math.max(2, Math.round(maxH * 0.55 * g.finSize)); // anal/pelvic fins
  const rootH   = Math.max(2, Math.round(maxH * 0.26));             // peduncle half-height
  const tailReach = rootH + Math.ceil(tailLen * 1.3);
  const W = tailLen + bodyLen + 6;
  const H = (Math.max(maxH + Math.max(dorsalH, ventH), tailReach) + 4) * 2;
  const cy = Math.floor(H / 2);

  const base   = FISH_COLORS[g.baseColor];
  const accent = FISH_COLORS[g.accentColor];
  const finC   = FISH_COLORS[g.finColor];
  // 5-step ramps (deep shadow .. specular) quantized with BAYER4
  const rampOf = c => [shade(c, 0.45), shade(c, 0.72), c, shade(c, 1.28), shade(c, 1.58)];
  const baseRamp = rampOf(base), accRamp = rampOf(accent);
  const outC   = shade(base, 0.28);                   // body outline
  const gillC  = shade(base, 0.58);
  const finHi  = shade(finC, 1.35), finLo = shade(finC, 0.58), finOut = shade(finC, 0.32);
  const irisC  = g.eyeSize > 2 ? [232, 186, 72] : [180, 60, 40]; // gold or red iris

  const frames = [];
  for (let f = 0; f < N_FRAMES; f++) {
    const phase = (f / N_FRAMES) * Math.PI * 2;
    const cv = document.createElement("canvas");
    cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");
    const px = (x, y, rgb) => { ctx.fillStyle = css(rgb); ctx.fillRect(x, y, 1, 1); };

    const sway = Math.sin(phase);                      // -1..1 tail sweep
    const flut = Math.sin(phase * 2) * 0.5 + 0.5;      // fin flutter
    // body undulation: strongest at the tail, nearly still at the nose
    const undAt = t => Math.round(sway * ((1 - t) * 2.4 + t * 0.2));

    // ==== tail (behind body, rooted at x = tailLen) ====================
    const veil = g.tailType === 3;
    for (let i = 0; i < tailLen; i++) {
      const x = tailLen - 1 - i;                       // i: distance from body
      const spread = i / tailLen;
      let hh;
      switch (g.tailType) {
        case 0: hh = rootH + Math.pow(spread, 0.8) * tailLen * 0.7; break;   // fan
        case 1: hh = rootH + Math.pow(spread, 1.1) * tailLen * 0.9; break;   // forked
        case 2: hh = rootH * (1 - spread) + Math.sin(spread * Math.PI) * tailLen * 0.35; break; // spade
        default: hh = rootH + Math.pow(Math.sin(spread * Math.PI * 0.85), 1.2) * tailLen * 0.8; // veil
      }
      hh = Math.max(1, Math.round(hh));
      const yOff = Math.round(i * sway * 0.45 * (veil ? 1.4 : 1)) + undAt(0);
      const notch = g.tailType === 1 ? hh * 0.5 * Math.pow(spread, 1.2) : -1;
      for (let dy = -hh; dy <= hh; dy++) {
        if (Math.abs(dy) < notch) continue;            // fork notch
        const y = cy + dy + yOff;
        const d4 = BAYER4[x & 3][y & 3];
        // dithered translucent trailing edge (long and soft on veil tails)
        const fade = (spread - (veil ? 0.55 : 0.72)) * (veil ? 2.2 : 3.5);
        if (fade > 0 && d4 < fade) continue;
        if (Math.abs(dy) === hh || (notch > 0 && Math.abs(dy) === Math.ceil(notch))) {
          px(x, y, finOut);                            // fin edge
          continue;
        }
        // radial fin rays fanning out from the peduncle joint
        const rayI = Math.floor(((dy / (hh + 1)) + 1) * 3.5);
        const c = dy < 0 ? (rayI % 2 ? finHi : finC) : (rayI % 2 ? finC : finLo);
        px(x, y, c);
      }
    }

    // ==== dorsal fin (sail with raked rays, behind body) ===============
    const dStart = Math.round(bodyLen * 0.28), dEnd = Math.round(bodyLen * 0.66);
    for (let bx = dStart; bx < dEnd; bx++) {
      const tt = (bx - dStart) / Math.max(1, dEnd - dStart);
      const t = bx / (bodyLen - 1);
      const h = Math.round(dorsalH * (0.3 + 0.7 * Math.pow(Math.sin(Math.PI * Math.min(1, tt * 0.62 + 0.08)), 0.9)));
      const topBody = cy + undAt(t) - Math.round(maxH * topProfile(t, g.shape));
      const finSway = Math.round(sway * 1.6 * tt);
      const x = tailLen + bx + finSway;
      for (let dy = 1; dy <= h; dy++) {
        const d4 = BAYER4[x & 3][dy & 3];
        if (dy > h * 0.6 && d4 < 0.3) continue;        // translucent upper edge
        if (dy === h) { px(x, topBody - dy, finOut); continue; }
        const raked = ((bx + (dy >> 1)) % 3 === 0);    // backward-raked rays
        px(x, topBody - dy, raked ? finLo : (dy > h * 0.5 ? finHi : finC));
      }
    }

    // ==== anal fin (smaller mirrored sail below) ========================
    const aStart = Math.round(bodyLen * 0.26), aEnd = Math.round(bodyLen * 0.48);
    for (let bx = aStart; bx < aEnd; bx++) {
      const tt = (bx - aStart) / Math.max(1, aEnd - aStart);
      const t = bx / (bodyLen - 1);
      const h = Math.round(ventH * (0.4 + 0.6 * Math.sin(Math.PI * Math.min(1, tt * 0.7 + 0.1))));
      const botBody = cy + undAt(t) + Math.round(maxH * botProfile(t, g.shape));
      const x = tailLen + bx + Math.round(sway * 1.2 * tt);
      for (let dy = 1; dy <= h; dy++) {
        if (dy === h) { px(x, botBody + dy, finOut); continue; }
        px(x, botBody + dy, ((bx + (dy >> 1)) % 3 === 0) ? finLo : finC);
      }
    }

    // ==== body ==========================================================
    for (let bx = 0; bx < bodyLen; bx++) {
      const t = bx / (bodyLen - 1);
      const topH = Math.max(1, Math.round(maxH * topProfile(t, g.shape)));
      const botH = Math.max(1, Math.round(maxH * botProfile(t, g.shape)));
      const und = undAt(t);
      const x = tailLen + bx;
      for (let dy = -topH; dy <= botH; dy++) {
        const y = cy + dy + und;
        // dark outline along the silhouette
        if (dy === -topH || dy === botH) { px(x, y, outC); continue; }
        const yRel = (dy + topH) / (topH + botH);      // 0 back .. 1 belly
        const d4 = BAYER4[x & 3][y & 3];

        // pattern picks base vs accent ramp (patterns fade out on the belly)
        let ramp = baseRamp;
        if (yRel < 0.88) switch (g.pattern) {
          case 1: {                                    // banded: bowed vertical bars
            const tt = t * g.patternFreq + Math.sin(yRel * Math.PI) * 0.3;
            if (Math.floor(tt) % 2 === 1) ramp = accRamp; break;
          }
          case 2:                                      // striped: dither-edged horizontals
            if (Math.floor(yRel * g.patternFreq + (d4 - 0.5) * 0.25) % 2 === 1) ramp = accRamp; break;
          case 3: {                                    // spotted: round jittered blobs
            const cs = 8;
            const gy = dy + 128;
            const cellX = Math.floor(bx / cs), cellY = Math.floor(gy / cs);
            if (hash2(cellX * 3 + 1, cellY * 3 + 2, g.seed) < 0.6) {
              const jx = cellX * cs + 2 + hash2(cellX, cellY, g.seed) * (cs - 4);
              const jy = cellY * cs + 2 + hash2(cellX + 77, cellY + 41, g.seed) * (cs - 4);
              const r = cs * (0.28 + hash2(cellX + 13, cellY + 7, g.seed) * 0.18);
              if ((bx - jx) ** 2 + (gy - jy) ** 2 < r * r) ramp = accRamp;
            }
            break;
          }
          case 4:                                      // shaded: dithered dark back
            if (yRel + (d4 - 0.5) * 0.18 < 0.42) ramp = accRamp; break;
        }

        // top-lit shading with a specular band along the upper flank
        let light = 1.28 - yRel * 1.05;
        if (yRel > 0.06 && yRel < 0.26) light += 0.38;  // specular highlight
        if (yRel > 0.9) light += 0.22;                  // reflected belly light
        const idx = Math.max(0, Math.min(4, Math.floor(light * 2.8 + d4) - 1));
        px(x, y, ramp[idx]);
      }
    }

    // ==== gill cover line ==============================================
    {
      const t = 0.78;
      const gx = tailLen + Math.round(bodyLen * t);
      const und = undAt(t);
      const th = Math.round(maxH * topProfile(t, g.shape) * 0.8);
      const bh = Math.round(maxH * botProfile(t, g.shape) * 0.75);
      for (let dy = -th; dy <= bh; dy++) {
        const bow = Math.round((dy * dy) / Math.max(1, maxH * maxH) * bodyLen * 0.07);
        px(gx + bow, cy + dy + und, gillC);
      }
    }

    // ==== pectoral fin: fan of rays from the shoulder, fluttering ======
    {
      const t = 0.68;
      const sx = tailLen + Math.round(bodyLen * t);
      const sy = cy + undAt(t) + Math.round(maxH * 0.12);
      const pecLen = Math.max(4, Math.round(maxH * 0.85 * g.finSize));
      const nRays = 10;                                // dense enough to fill solid
      const a0 = 0.30 + flut * 0.30, a1 = a0 + 0.75;
      for (let k = 0; k < nRays; k++) {
        const ang = a0 + (k / (nRays - 1)) * (a1 - a0);
        const len = pecLen * (1 - 0.25 * Math.abs(k / (nRays - 1) - 0.35));
        for (let l = 1; l <= len; l++) {
          const x = sx - Math.round(Math.cos(ang) * l);
          const y = sy + Math.round(Math.sin(ang) * l);
          if (l > len - 2) { px(x, y, finOut); continue; }  // edged tip
          px(x, y, (k % 3 === 2) ? finLo : finC);
        }
      }
    }

    // ==== eye: outlined ball, colored iris, offset pupil, catch-light ==
    {
      const t = 0.84;
      const er = 1 + g.eyeSize;                        // radius 2..4 px
      const eyeX = tailLen + Math.round(bodyLen * t) + Math.round(bodyLen * 0.02);
      const eyeY = cy + undAt(t) - Math.round(maxH * 0.28);
      for (let dy = -er; dy <= er; dy++) {
        for (let dx = -er; dx <= er; dx++) {
          const r2 = dx * dx + dy * dy;
          if (r2 > er * er) continue;
          let c = [244, 240, 230];                     // sclera
          if (r2 > (er - 1) * (er - 1)) c = [30, 24, 20];              // ring
          else if ((dx - 1) ** 2 + dy ** 2 <= (er - 2) ** 2 + 1) c = irisC; // iris (looks forward)
          if (dx === 1 && dy === 0) c = [10, 8, 8];                    // pupil
          px(eyeX + dx, eyeY + dy, c);
        }
      }
      px(eyeX - 1, eyeY - Math.max(1, er - 2), [255, 255, 255]);       // catch-light
    }

    // ==== mouth =========================================================
    {
      const und = undAt(1);
      const my = cy + und + Math.round(maxH * botProfile(0.985, g.shape) * 0.35);
      ctx.fillStyle = css(outC);
      ctx.fillRect(tailLen + bodyLen - 3, my, 3, 1);
    }

    frames.push(cv);
  }
  return { frames, w: W, h: H, anchorX: tailLen + Math.round(bodyLen / 2), anchorY: cy };
}

// ---------------------------------------------------------------------
// Fish entity: wander AI, hunger, growth.
// ---------------------------------------------------------------------
let nextFishId = 1;
class Fish {
  constructor(genome, name, generation, x, y) {
    this.id = nextFishId++;
    this.genome = genome;
    this.name = name || fishName();
    this.generation = generation || 1;
    this.sprite = renderFishFrames(genome);
    this.x = x !== undefined ? x : randRange(80, TANK_W - 80);
    this.y = y !== undefined ? y : randRange(60, TANK_H - 100);
    this.dir = rand() < 0.5 ? 1 : -1;          // 1 = facing right
    this.scale = generation > 1 ? 0.45 : 1;    // fry start small and grow
    this.age = 0;
    this.animPhase = rand() * N_FRAMES;
    this.targetX = this.x; this.targetY = this.y;
    this.pauseT = 0;
    this.pickNewTarget();
  }
  pickNewTarget() {
    this.targetX = randRange(60, TANK_W - 60);
    this.targetY = randRange(48, TANK_H - 88);
  }
  update(dt, food) {
    this.age += dt;
    if (this.scale < 1) this.scale = Math.min(1, this.scale + dt * 0.008);

    // chase nearest food pellet if any
    let tx = this.targetX, ty = this.targetY, chasing = false;
    if (food.length) {
      let best = null, bd = 1e9;
      for (const p of food) {
        const d = (p.x - this.x) ** 2 + (p.y - this.y) ** 2;
        if (d < bd) { bd = d; best = p; }
      }
      if (best && bd < 240 * 240) { tx = best.x; ty = best.y; chasing = true;
        if (bd < 144) best.eaten = true; }
    }

    if (this.pauseT > 0 && !chasing) { this.pauseT -= dt; this.animPhase += dt * 3; return; }

    const dx = tx - this.x, dy = ty - this.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 12) {
      if (!chasing) {
        this.pickNewTarget();
        if (rand() < 0.35) this.pauseT = randRange(0.5, 2.5);
      }
      return;
    }
    const sp = this.genome.speed * 36 * (chasing ? 1.8 : 1) * this.scale;
    this.x += (dx / dist) * sp * dt;
    this.y += (dy / dist) * sp * dt * 0.6;      // fish turn slower vertically
    if (Math.abs(dx) > 2) this.dir = dx > 0 ? 1 : -1;
    this.animPhase += dt * (5 + this.genome.speed * 4) * (chasing ? 1.6 : 1);
  }
  draw(ctx) {
    const s = this.sprite;
    const frame = s.frames[((Math.floor(this.animPhase) % N_FRAMES) + N_FRAMES) % N_FRAMES];
    const dw = s.w * this.scale, dh = s.h * this.scale;
    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    if (this.dir === -1) ctx.scale(-1, 1);     // sprites face right natively; flip when swimming left
    ctx.drawImage(frame, -Math.round(s.anchorX * this.scale), -Math.round(s.anchorY * this.scale), Math.round(dw), Math.round(dh));
    ctx.restore();
  }
  hitTest(mx, my) {
    const s = this.sprite;
    const hw = (s.w * this.scale) / 2, hh = (s.h * this.scale) / 2;
    return mx > this.x - hw && mx < this.x + hw && my > this.y - hh && my < this.y + hh;
  }
  serialize() {
    return { genome: this.genome, name: this.name, generation: this.generation, x: this.x, y: this.y, age: this.age, scale: this.scale };
  }
  static deserialize(d) {
    const f = new Fish(d.genome, d.name, d.generation, d.x, d.y);
    f.age = d.age || 0;
    f.scale = d.scale !== undefined ? d.scale : 1;
    return f;
  }
}

// ---------------------------------------------------------------------
// Tank environment: pre-rendered background (water gradient, rocks,
// gravel), swaying plants, rising bubbles, drifting light rays.
// ---------------------------------------------------------------------
const TANK_W = 640, TANK_H = 480;
const canvas = document.getElementById("tank");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const bgCanvas = document.createElement("canvas");
bgCanvas.width = TANK_W; bgCanvas.height = TANK_H;
(function renderBackground() {
  const b = bgCanvas.getContext("2d");
  const seed = 1337;
  // dithered water gradient, deep blue bottom to teal top
  const top = [24, 88, 120], bot = [8, 24, 64];
  for (let y = 0; y < TANK_H; y++) {
    const t = y / TANK_H;
    for (let x = 0; x < TANK_W; x++) {
      const d = BAYER[x & 1][y & 1] * 0.12 - 0.06;
      const tt = Math.max(0, Math.min(1, t + d));
      b.fillStyle = css([
        Math.round(top[0] + (bot[0] - top[0]) * tt),
        Math.round(top[1] + (bot[1] - top[1]) * tt),
        Math.round(top[2] + (bot[2] - top[2]) * tt),
      ]);
      b.fillRect(x, y, 1, 1);
    }
  }
  // gravel bed (2px grains at this resolution)
  const gravelCols = [[96, 84, 64], [128, 112, 84], [72, 64, 52], [148, 132, 100], [60, 52, 44]];
  for (let y = TANK_H - 36; y < TANK_H; y += 2) {
    for (let x = 0; x < TANK_W; x += 2) {
      const edge = TANK_H - 36 + Math.round(hash2(x >> 3, 7, seed) * 8);
      if (y >= edge) {
        b.fillStyle = css(gravelCols[Math.floor(hash2(x >> 1, y >> 1, seed) * gravelCols.length)]);
        b.fillRect(x, y, 2, 2);
      }
    }
  }
  // a few rocks
  for (let r = 0; r < 4; r++) {
    const rx = 60 + r * 170 + Math.round(hash2(r, 1, seed) * 60);
    const rw = 28 + Math.round(hash2(r, 2, seed) * 36);
    const rh = 12 + Math.round(hash2(r, 3, seed) * 16);
    for (let dy = 0; dy <= rh; dy++) {
      const hw = Math.round(rw * Math.sqrt(1 - (dy / rh) ** 2) / 2);
      for (let dx = -hw; dx <= hw; dx++) {
        const shadeF = 0.5 + (1 - dy / rh) * 0.5 + BAYER[(rx + dx) & 1][dy & 1] * 0.15;
        b.fillStyle = css(shade([110, 106, 112], shadeF));
        b.fillRect(rx + dx, TANK_H - 28 - rh + dy, 1, 1);
      }
    }
  }
})();

// Plants: stalks of segments that sway.
const plants = [];
(function makePlants() {
  const greens = [[36, 120, 48], [52, 152, 60], [28, 96, 44], [80, 176, 72]];
  for (let i = 0; i < 9; i++) {
    plants.push({
      x: 24 + i * 72 + randInt(36),
      h: 70 + randInt(130),
      col: pick(greens),
      phase: rand() * Math.PI * 2,
      leafEvery: 3 + randInt(3),
    });
  }
})();
function drawPlants(time) {
  for (const p of plants) {
    const segs = Math.floor(p.h / 5);
    let x = p.x;
    const colLo = shade(p.col, 0.6);
    for (let s = 0; s < segs; s++) {
      const y = TANK_H - 24 - s * 5;
      const swayAmt = (s / segs) ** 2 * 6;
      x = p.x + Math.sin(time * 0.9 + p.phase + s * 0.4) * swayAmt;
      ctx.fillStyle = css(s % 2 ? p.col : colLo);
      ctx.fillRect(Math.round(x), y - 5, 3, 5);
      if (s % p.leafEvery === 1) {
        ctx.fillStyle = css(p.col);
        const side = (s % (p.leafEvery * 2) === 1) ? 2 : -6;
        ctx.fillRect(Math.round(x) + side, y - 4, 5, 3);
      }
    }
  }
}

// Bubbles.
const bubbles = [];
function updateBubbles(dt, time) {
  if (rand() < dt * 2.8) {
    bubbles.push({ x: 88 + randInt(3) * 200 + randInt(20), y: TANK_H - 32, r: rand() < 0.3 ? 3 : 2, wob: rand() * 6 });
  }
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const bu = bubbles[i];
    bu.y -= dt * (36 + bu.r * 10);
    if (bu.y < 4) { bubbles.splice(i, 1); continue; }
    const bx = Math.round(bu.x + Math.sin(time * 3 + bu.wob) * 3);
    ctx.fillStyle = "rgba(190,230,250,0.85)";
    ctx.fillRect(bx, Math.round(bu.y), bu.r, bu.r);
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fillRect(bx, Math.round(bu.y), 1, 1);
  }
}

// Light rays (subtle, additive bands from the top).
function drawLightRays(time) {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < 3; i++) {
    const rx = ((time * 8 + i * 240) % (TANK_W + 240)) - 120;
    const grad = ctx.createLinearGradient(rx, 0, rx + 100, TANK_H);
    grad.addColorStop(0, "rgba(120,190,220,0.10)");
    grad.addColorStop(1, "rgba(120,190,220,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(rx, 0); ctx.lineTo(rx + 52, 0);
    ctx.lineTo(rx + 132, TANK_H); ctx.lineTo(rx + 20, TANK_H);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// Food pellets.
const food = [];
function updateFood(dt) {
  for (let i = food.length - 1; i >= 0; i--) {
    const p = food[i];
    p.y += dt * 18;
    p.x += Math.sin(p.y * 0.15) * 0.3;
    if (p.eaten || p.y > TANK_H - 34) { food.splice(i, 1); continue; }
    ctx.fillStyle = "#c8903c";
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 3, 3);
    ctx.fillStyle = "#e8b860";
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 1);
  }
}

// ---------------------------------------------------------------------
// Critters: optional bottom-dwelling tank companions. Like the fish,
// each critter pre-renders a strip of animation frames at creation.
// ---------------------------------------------------------------------
const FLOOR_Y = TANK_H - 26;             // where feet rest on the gravel

const CRITTER_INFO = {
  snail:    { label: "Snail",    names: ["Gary", "Sheldon", "Turbo", "Escar", "Doris", "Brian"],      flavor: "rasping algae" },
  shrimp:   { label: "Shrimp",   names: ["Sakura", "Pinky", "Krill", "Paprika", "Momo", "Scampi"],    flavor: "picking at the gravel" },
  clam:     { label: "Clam",     names: ["Pearl", "Chowder", "Clementine", "Shelly", "Grit"],         flavor: "filtering the water" },
  crayfish: { label: "Crayfish", names: ["Pinchy", "Clawdia", "Rusty", "Cobalt", "Snips"],            flavor: "patrolling its patch" },
};

function makeCritterVariant(type) {
  switch (type) {
    case "snail":
      return { shell: pick([[196, 132, 60], [222, 176, 88], [140, 96, 128], [172, 66, 50]]),
               stripes: rand() < 0.5, size: randRange(1.1, 1.6), seed: randInt(1e9) };
    case "shrimp":
      return { ghost: rand() < 0.35, size: randRange(1.0, 1.4), seed: randInt(1e9) };
    case "clam":

    default: // crayfish
      return { shell: rand() < 0.4 ? [74, 112, 214] : [158, 84, 48],
               size: randRange(1.1, 1.5), seed: randInt(1e9) };
  }
}

// --- snail: spiral shell, creeping foot, swaying eye stalks ------------
function renderSnailFrames(v) {
  const W = 28, H = 22, frames = [];
  const ramp = [shade(v.shell, 0.5), shade(v.shell, 0.8), v.shell, shade(v.shell, 1.32)];
  const foot = [198, 170, 134], footLo = shade(foot, 0.72), footOut = shade(foot, 0.4);
  for (let f = 0; f < N_FRAMES; f++) {
    const ph = (f / N_FRAMES) * Math.PI * 2;
    const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const c = cv.getContext("2d");
    const px = (x, y, rgb) => { c.fillStyle = css(rgb); c.fillRect(x, y, 1, 1); };
    // foot: long muscle hugging the ground, head lifted, creeping ripple
    for (let x = 2; x <= 25; x++) {
      const t = (x - 2) / 23;
      const lift = x > 20 ? Math.round((x - 20) * 0.9) : 0;   // head rises
      const top = H - 4 - Math.round(Math.sin(Math.PI * Math.min(1, t * 1.15)) * 1.5) - lift;
      for (let y = top; y <= H - 2; y++) {
        const edge = y === top || y === H - 2 || x === 2 || x === 25;
        const ripple = Math.sin(ph * 2 + x * 0.85) > 0.35 && y === H - 3;
        px(x, y, edge ? footOut : (ripple ? footLo : foot));
      }
    }
    // eye stalks with beady tips, swaying gently out of phase
    const hx = 23, hy = H - 8;
    [[-1.15, 6, 0], [-0.6, 7, 1.7]].forEach(([baseAng, len, k]) => {
      const ang = baseAng + Math.sin(ph + k) * 0.2;
      for (let l = 1; l <= len; l++) {
        const x = hx + Math.round(Math.cos(ang) * l * 0.9);
        const y = hy + Math.round(Math.sin(ang) * l);
        px(x, y, l === len ? [22, 16, 12] : footLo);
      }
    });
    // shell: dithered ball with a spiral groove and optional stripes
    const scx = 11, scy = H - 12, r = 7.6;
    for (let dy = -8; dy <= 8; dy++) for (let dx = -8; dx <= 8; dx++) {
      const d2 = dx * dx + dy * dy;
      if (d2 > r * r) continue;
      const x = scx + dx, y = scy + dy;
      if (d2 > (r - 1) * (r - 1)) { px(x, y, shade(v.shell, 0.34)); continue; }
      const angp = Math.atan2(dy, dx) / (Math.PI * 2) + 0.5;
      const rad = Math.sqrt(d2) / r;
      let col;
      if (((angp * 2 + rad * 2.4) % 1) < 0.15) col = ramp[0];      // spiral groove
      else {
        const light = 1.2 - ((dy + 8) / 16) * 1.0 + (dx < 0 ? 0.1 : 0);
        col = ramp[Math.max(0, Math.min(3, Math.floor(light * 2.2 + BAYER4[x & 3][y & 3]) - 1))];
      }
      if (v.stripes && (Math.floor(angp * 6) % 2 === 0) && rad > 0.35) col = shade(col, 0.74);
      px(x, y, col);
    }
    frames.push(cv);
  }
  return { frames, w: W, h: H, anchorX: 13, anchorY: H - 1 };
}

// Stamp shapes into a silhouette mask, then shade columns and outline the
// merged shape — gives critters one clean edge instead of overlapping blobs.
function maskPainter(W, H) {
  const mask = new Uint8Array(W * H);
  return {
    mask,
    disc(cx, cy, r) {
      const R = Math.ceil(r);
      for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
        if (dx * dx + dy * dy > r * r) continue;
        const x = Math.round(cx + dx), y = Math.round(cy + dy);
        if (x >= 0 && y >= 0 && x < W && y < H) mask[y * W + x] = 1;
      }
    },
    ellipse(cx, cy, rx, ry) {
      const RX = Math.ceil(rx), RY = Math.ceil(ry);
      for (let dy = -RY; dy <= RY; dy++) for (let dx = -RX; dx <= RX; dx++) {
        if ((dx / rx) ** 2 + (dy / ry) ** 2 > 1) continue;
        const x = Math.round(cx + dx), y = Math.round(cy + dy);
        if (x >= 0 && y >= 0 && x < W && y < H) mask[y * W + x] = 1;
      }
    },
    set(x, y) { if (x >= 0 && y >= 0 && x < W && y < H) mask[y * W + x] = 1; },
    // paint(x, y, edge, yRel) decides the pixel color; skip by returning null
    render(px, paint) {
      for (let x = 0; x < W; x++) {
        let minY = -1, maxY = -1;
        for (let y = 0; y < H; y++) if (mask[y * W + x]) { if (minY < 0) minY = y; maxY = y; }
        if (minY < 0) continue;
        for (let y = minY; y <= maxY; y++) {
          if (!mask[y * W + x]) continue;
          const edge = x === 0 || x === W - 1 || y === 0 || y === H - 1 ||
            !mask[y * W + x - 1] || !mask[y * W + x + 1] || !mask[(y - 1) * W + x] || !mask[(y + 1) * W + x];
          const col = paint(x, y, edge, (y - minY) / Math.max(1, maxY - minY));
          if (col) px(x, y, col);
        }
      }
    },
  };
}

// --- shrimp: curled body, flickering legs and swimmerets, antennae -----
function renderShrimpFrames(v) {
  const W = 28, H = 18, frames = [];
  const bodyC = v.ghost ? [178, 196, 192] : [216, 60, 48];
  const ramp = [shade(bodyC, 0.55), shade(bodyC, 0.85), bodyC, shade(bodyC, 1.35)];
  const outc = shade(bodyC, 0.32);
  for (let f = 0; f < N_FRAMES; f++) {
    const ph = (f / N_FRAMES) * Math.PI * 2;
    const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const c = cv.getContext("2d");
    const px = (x, y, rgb) => { c.fillStyle = css(rgb); c.fillRect(x, y, 1, 1); };
    // antennae sweeping back over the body (dashed = hair thin)
    const swayA = Math.sin(ph) * 0.5;
    for (let a = 0; a < 2; a++) {
      for (let l = 1; l <= 14; l++) {
        const x = 22 - l;
        const y = 4 - Math.round(Math.sin(l * 0.2 + swayA + a * 0.6) * (1.5 + a));
        if ((l & 1) === 0) px(x, y, shade(bodyC, 1.15));
      }
    }
    // one silhouette: curled body discs + rostrum + tail fan
    const mp = maskPainter(W, H);
    const spine = [[21, 8, 3.2], [18, 7.4, 3.4], [15, 7.6, 3.1], [12, 8.6, 2.6], [9, 10, 2.2], [7, 11.6, 1.8], [5, 13, 1.4]];
    for (const [sx, sy, r] of spine) mp.disc(sx, sy, r);
    mp.set(24, 6); mp.set(25, 5); mp.set(24, 5);          // rostrum
    for (let l = 0; l < 5; l++) {                          // tail fan
      const x = 5 - l;
      const half = Math.max(1, Math.round(l * 0.8));
      for (let k = -half; k <= half; k++) mp.set(x, 13 + Math.round(l * 0.5) + k);
    }
    mp.render(px, (x, y, edge, yRel) => {
      if (edge) return outc;
      const d4 = BAYER4[x & 3][y & 3];
      if (v.ghost && d4 < 0.38) return null;               // translucency
      const light = 1.3 - yRel * 1.1;
      let col = ramp[Math.max(0, Math.min(3, Math.floor(light * 2.3 + d4) - 1))];
      if (!v.ghost && hash2(x >> 1, y >> 1, v.seed) < 0.14) col = ramp[3];  // mottling
      if (v.ghost && hash2(x, y, v.seed) < 0.08) col = [92, 106, 102];      // speckles
      return col;
    });
    // stalked eye on top
    px(23, 6, [12, 12, 12]); px(23, 5, [46, 46, 50]);
    // walking legs: fine, quick alternating kicks
    for (let k = 0; k < 5; k++) {
      const bx = 12 + k * 2;
      const kick = Math.sin(ph * 2 + k * 1.4);
      for (let l = 1; l <= 4; l++) px(bx + Math.round(kick * l * 0.35), 10 + l, ramp[1]);
    }
    // swimmerets fluttering under the abdomen
    for (let k = 0; k < 3; k++) {
      const bx = 7 + k * 2;
      const flap = Math.sin(ph * 3 + k * 1.1);
      px(bx + Math.round(flap * 1.2), 14, ramp[1]);
      px(bx + Math.round(flap * 1.2), 15, ramp[0]);
    }
    frames.push(cv);
  }
  return { frames, w: W, h: H, anchorX: 14, anchorY: 16 };
}

// --- clam: half-buried, valves gape slowly, mantle peeking out ---------
function renderClamFrames(v) {
  const W = 24, H = 18, frames = [];
  const ramp = [shade(v.shell, 0.5), shade(v.shell, 0.78), v.shell, shade(v.shell, 1.3)];
  const outc = shade(v.shell, 0.34);
  const mantle = [238, 188, 178], mantleLo = shade(mantle, 0.72);
  for (let f = 0; f < N_FRAMES; f++) {
    const ph = (f / N_FRAMES) * Math.PI * 2;
    const open = Math.round(((1 - Math.cos(ph)) / 2) * 3);   // 0..3 px gape
    const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const c = cv.getContext("2d");
    const px = (x, y, rgb) => { c.fillStyle = css(rgb); c.fillRect(x, y, 1, 1); };
    const cx = 12, cyv = H - 7, rx = 9, ry = 5.5;
    // mantle flesh showing in the gape
    for (let g2 = 1; g2 <= open; g2++) {
      const y = cyv - g2;
      for (let x = cx - 5; x <= cx + rx - 2; x++) {
        px(x, y, BAYER4[x & 3][y & 3] < 0.5 ? mantle : mantleLo);
      }
    }
    // valves: bottom fixed, top tilted up by `open` px at the lip (right)
    for (const topValve of [false, true]) {
      for (let dx = -rx; dx <= rx; dx++) {
        const w = Math.sqrt(Math.max(0, 1 - (dx / rx) ** 2));
        const hh = Math.max(1, Math.round(ry * w));
        for (let k = 1; k <= hh; k++) {
          // top valve pivots at the hinge (left side), so lift scales with dx
          const lift = topValve ? Math.round(open * (dx + rx) / (2 * rx)) : 0;
          const x = cx + dx;
          const y = topValve ? cyv - k - lift : cyv + k - 1;
          const edge = k === hh;
          // radial growth ridges fanning from the hinge
          const ang = Math.atan2(topValve ? -k : k, dx + rx + 2);
          const ridge = Math.floor((ang + 1.6) * 8) % 2 === 0;
          const light = topValve ? 1.55 - (k / ry) * 0.85 : 0.68 - (k / ry) * 0.2;
          let col = ramp[Math.max(0, Math.min(3, Math.floor(light * 2.2 + BAYER4[x & 3][y & 3]) - 1))];
          if (ridge) col = shade(col, 0.7);
          px(x, y, edge ? outc : col);
        }
      }
    }
    // dark lip seam where the valves meet when shut
    if (open === 0) for (let dx = -4; dx <= rx - 1; dx++) px(cx + dx, cyv - 1, outc);
    frames.push(cv);
  }
  return { frames, w: W, h: H, anchorX: 12, anchorY: H - 1 };
}

// --- crayfish: armored tail, big pincers, walking legs, antennae -------
function renderCrayfishFrames(v) {
  const W = 42, H = 24, frames = [];
  const ramp = [shade(v.shell, 0.5), shade(v.shell, 0.8), v.shell, shade(v.shell, 1.3)];
  const outc = shade(v.shell, 0.32);
  for (let f = 0; f < N_FRAMES; f++) {
    const ph = (f / N_FRAMES) * Math.PI * 2;
    const bob = Math.round(Math.sin(ph * 2) * 0.6);          // walking bob
    const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const c = cv.getContext("2d");
    const px = (x, y, rgb) => { c.fillStyle = css(rgb); c.fillRect(x, y, 1, 1); };
    // long antennae sweeping back, swaying
    const swayA = Math.sin(ph) * 0.4;
    for (let a = 0; a < 2; a++) {
      for (let l = 1; l <= 18; l++) {
        const x = 29 - l;
        const y = 6 - Math.round(Math.sin(l * 0.14 + swayA + a * 0.7) * (2 + a * 1.5));
        if ((l & 1) === 0) px(x, y, ramp[1]);
      }
    }
    // walking legs behind the body: 4 pairs, alternating stride
    for (let k = 0; k < 4; k++) {
      const bx = 17 + k * 2.4;
      const kick = Math.sin(ph * 2 + k * 1.6);
      for (let l = 1; l <= 6; l++) {
        px(Math.round(bx + kick * l * 0.4), 14 + bob + l, l > 4 ? ramp[0] : ramp[1]);
      }
    }
    // one silhouette: tail fan + abdomen + carapace + arm + claw
    const snap = Math.round((1 + Math.sin(ph * 2)) * 1.1);
    const mp = maskPainter(W, H);
    for (let l = 0; l < 5; l++) {                          // tail fan
      const x = 5 - l;
      const half = Math.max(1, Math.round(l * 0.9));
      for (let k = -half; k <= half; k++) mp.set(x, 13 + bob + k);
    }
    for (let s = 0; s < 4; s++) {                          // abdomen segments
      mp.ellipse(7 + s * 3, 13 + bob, 2.2, 2.5 + s * 0.55);
    }
    mp.ellipse(22, 12 + bob, 6.8, 4.9);                    // carapace
    mp.set(29, 10 + bob); mp.set(30, 10 + bob); mp.set(30, 11 + bob); // rostrum
    for (let l = 0; l < 5; l++) {                          // claw arm reaching forward-down
      mp.set(27 + l, 14 + bob + Math.round(l * 0.4));
      mp.set(27 + l, 15 + bob + Math.round(l * 0.4));
    }
    mp.ellipse(34, 16 + bob, 3.4, 2.4);                    // claw hand
    for (let l = 0; l < 3; l++) {                          // fingers, snapping
      mp.set(37 + l, 15 + bob - (l > 0 ? snap : 0));
      mp.set(37 + l, 17 + bob + (l > 0 ? snap : 0));
    }
    mp.render(px, (x, y, edge, yRel) => {
      if (edge) return outc;
      const d4 = BAYER4[x & 3][y & 3];
      const light = 1.3 - yRel * 1.1;
      let col = ramp[Math.max(0, Math.min(3, Math.floor(light * 2.2 + d4) - 1))];
      // segment seams across the abdomen
      if (x >= 5 && x <= 16 && ((x - 5) % 3 === 0)) col = shade(col, 0.72);
      // shell texture speckles
      if (hash2(x >> 1, y >> 1, v.seed) < 0.1) col = ramp[3];
      return col;
    });
    // stalked eyes on top of the head
    px(28, 8 + bob, [10, 10, 10]); px(27, 8 + bob, [48, 48, 52]);
    px(28, 9 + bob, ramp[0]);
    frames.push(cv);
  }
  return { frames, w: W, h: H, anchorX: 20, anchorY: 22 };
}

function renderCritterFrames(type, v) {
  switch (type) {
    case "snail":  return renderSnailFrames(v);
    case "shrimp": return renderShrimpFrames(v);
    case "clam":   return renderClamFrames(v);
    default:       return renderCrayfishFrames(v);
  }
}

let nextCritterId = 1;
class Critter {
  constructor(type, x, variant, name) {
    this.id = nextCritterId++;
    this.type = type;
    this.variant = variant || makeCritterVariant(type);
    this.name = name || pick(CRITTER_INFO[type].names);
    this.sprite = renderCritterFrames(type, this.variant);
    this.x = x !== undefined ? x : randRange(60, TANK_W - 60);
    this.y = this.groundY();
    this.dir = rand() < 0.5 ? 1 : -1;
    this.animPhase = rand() * N_FRAMES;
    this.state = "idle";
    this.stateT = randRange(1, 4);
    this.vx = 0; this.vy = 0;
    this.cool = randRange(2, 6);            // startle cooldown
    this.wall = null;                        // snail: null | "L" | "R"
    this.wallPhase = "up"; this.wallTarget = 0;
  }
  groundY() { return FLOOR_Y + (this.type === "clam" ? 7 : 0) + (this.id % 5); }

  update(dt) {
    this.cool -= dt;
    switch (this.type) {
      case "snail": this.updateSnail(dt); break;
      case "shrimp": this.updateShrimp(dt); break;
      case "clam": this.updateClam(dt); break;
      default: this.updateCrayfish(dt);
    }
  }

  updateSnail(dt) {
    this.animPhase += dt * 1.6;              // slow foot ripple & stalk sway
    const v = 3.2;                           // a snail's pace
    if (!this.wall) {
      this.x += this.dir * v * dt;
      if (rand() < dt * 0.015) this.dir *= -1;
      if (this.x < 16) { this.wall = "L"; this.x = 13; this.startClimb(); }
      else if (this.x > TANK_W - 16) { this.wall = "R"; this.x = TANK_W - 13; this.startClimb(); }
    } else {
      if (this.wallPhase === "up") {
        this.y -= v * dt;
        if (this.y <= this.wallTarget) { this.wallPhase = "rest"; this.stateT = randRange(3, 9); }
      } else if (this.wallPhase === "rest") {
        this.stateT -= dt;
        if (this.stateT <= 0) this.wallPhase = "down";
      } else {
        this.y += v * dt;
        if (this.y >= this.groundY()) {
          this.y = this.groundY();
          this.dir = this.wall === "L" ? 1 : -1;   // wander back into the tank
          this.wall = null;
        }
      }
    }
  }
  startClimb() {
    this.wallPhase = "up";
    this.wallTarget = randRange(TANK_H * 0.3, FLOOR_Y - 50);
  }

  updateShrimp(dt) {
    this.animPhase += dt * (this.state === "dart" ? 16 : 8);
    if (this.state === "dart") {
      this.x += this.vx * dt; this.y += this.vy * dt;
      this.vy += 150 * dt;                   // sink back down
      this.vx *= Math.pow(0.12, dt);
      if (this.y >= this.groundY()) { this.y = this.groundY(); this.state = "idle"; this.stateT = randRange(1, 3); }
    } else {
      if (this.y < this.groundY()) this.y = Math.min(this.groundY(), this.y + 26 * dt);
      this.stateT -= dt;
      if (this.state === "walk") {
        this.x += this.dir * 7 * dt;         // dainty little steps
        if (this.stateT <= 0) { this.state = "idle"; this.stateT = randRange(1.5, 5); }
      } else if (this.stateT <= 0) {
        this.state = "walk"; this.stateT = randRange(0.6, 2);
        if (rand() < 0.4) this.dir *= -1;
      }
      // amble toward sinking food
      let tgt = null, bd = 1e9;
      for (const p of food) {
        if (p.y > TANK_H - 100) { const d = Math.abs(p.x - this.x); if (d < bd) { bd = d; tgt = p; } }
      }
      if (tgt && bd < 130) {
        this.state = "walk"; this.dir = tgt.x > this.x ? 1 : -1; this.stateT = 0.4;
        if (bd < 8 && tgt.y > this.y - 16) tgt.eaten = true;
      }
      // startle: quick backwards tail-flick away from looming fish
      if (this.cool <= 0) for (const fsh of fishes) {
        const dx = fsh.x - this.x, dy = fsh.y - this.y;
        if (dx * dx + dy * dy < 52 * 52) {
          this.state = "dart";
          this.vx = (dx > 0 ? -1 : 1) * randRange(120, 175);
          this.vy = -randRange(60, 120);
          this.dir = this.vx > 0 ? 1 : -1;
          this.cool = randRange(4, 9);
          break;
        }
      }
    }
    this.x = Math.max(22, Math.min(TANK_W - 22, this.x));
    this.y = Math.min(this.y, this.groundY());
  }

  updateClam(dt) {
    this.animPhase += dt * 0.75;             // one slow gape cycle ~11s
    const fi = Math.floor(this.animPhase) % N_FRAMES;
    if (fi >= 3 && fi <= 5 && rand() < dt * 0.5) {   // exhale a bubble while open
      bubbles.push({ x: this.x + randRange(-2, 4), y: this.y - 16, r: 2, wob: rand() * 6 });
    }
  }

  updateCrayfish(dt) {
    this.animPhase += dt * (this.state === "dart" ? 14 : 5);
    if (this.state === "dart") {             // backward escape tail-flip
      this.x += this.vx * dt; this.y += this.vy * dt;
      this.vy += 190 * dt;
      this.vx *= Math.pow(0.1, dt);
      if (this.y >= this.groundY()) { this.y = this.groundY(); this.state = "idle"; this.stateT = randRange(2, 5); }
    } else {
      this.stateT -= dt;
      if (this.state === "walk") {
        this.x += this.dir * 5.5 * dt;       // deliberate armored strut
        if (this.stateT <= 0) { this.state = "idle"; this.stateT = randRange(2, 6); }
      } else if (this.stateT <= 0) {
        this.state = "walk"; this.stateT = randRange(1.5, 4);
        if (rand() < 0.5) this.dir *= -1;
      }
      let tgt = null, bd = 1e9;
      for (const p of food) {
        if (p.y > TANK_H - 100) { const d = Math.abs(p.x - this.x); if (d < bd) { bd = d; tgt = p; } }
      }
      if (tgt && bd < 150) {
        this.state = "walk"; this.dir = tgt.x > this.x ? 1 : -1; this.stateT = 0.4;
        if (bd < 10 && tgt.y > this.y - 18) tgt.eaten = true;
      }
      if (this.cool <= 0) for (const fsh of fishes) {
        const dx = fsh.x - this.x, dy = fsh.y - this.y;
        if (dx * dx + dy * dy < 44 * 44) {
          this.state = "dart";
          this.vx = -this.dir * randRange(150, 210);  // crayfish flee backwards
          this.vy = -randRange(40, 80);
          this.cool = randRange(6, 12);
          break;
        }
      }
    }
    this.x = Math.max(30, Math.min(TANK_W - 30, this.x));
  }

  draw(ctx) {
    const s = this.sprite;
    const fi = ((Math.floor(this.animPhase) % N_FRAMES) + N_FRAMES) % N_FRAMES;
    const sc = this.variant.size;
    ctx.save();
    ctx.translate(Math.round(this.x), Math.round(this.y));
    if (this.type === "snail" && this.wall) {
      // rotate so the foot presses against the glass; flip to face travel
      if (this.wall === "L") { ctx.rotate(Math.PI / 2); if (this.wallPhase !== "down") ctx.scale(-1, 1); }
      else { ctx.rotate(-Math.PI / 2); if (this.wallPhase === "down") ctx.scale(-1, 1); }
    } else if (this.dir === -1) ctx.scale(-1, 1);
    ctx.drawImage(s.frames[fi], -Math.round(s.anchorX * sc), -Math.round(s.anchorY * sc),
                  Math.round(s.w * sc), Math.round(s.h * sc));
    ctx.restore();
  }
  hitTest(mx, my) {
    const hw = (this.sprite.w * this.variant.size) / 2 + 3;
    const hh = this.sprite.h * this.variant.size + 3;
    return mx > this.x - hw && mx < this.x + hw && my > this.y - hh && my < this.y + 4;
  }
  serialize() {
    return { type: this.type, variant: this.variant, name: this.name, x: this.x, y: this.y, dir: this.dir };
  }
  static deserialize(d) {
    const cr = new Critter(d.type, d.x, d.variant, d.name);
    cr.y = d.y; cr.dir = d.dir || 1;
    return cr;
  }
}

const critters = [];
const MAX_CRITTERS = 12;
function addCritter(type) {
  if (!CRITTER_INFO[type]) return;
  if (critters.length >= MAX_CRITTERS) { setStatus("The tank is crowded enough down there already."); return; }
  const cr = new Critter(type);
  critters.push(cr);
  setStatus(`${cr.name} the ${CRITTER_INFO[type].label} settles in, ${CRITTER_INFO[type].flavor}.`);
}

// ---------------------------------------------------------------------
// Game state + UI
// ---------------------------------------------------------------------
const fishes = [];
const selected = [];           // up to 2 fish ids, in click order
const statusEl = document.getElementById("status");
function setStatus(msg) { statusEl.textContent = msg; }

function addRandomFish() {
  const f = new Fish(randomGenome());
  fishes.push(f);
  setStatus(`You caught ${f.name}! (${describeGenome(f.genome)})`);
  return f;
}

function describeGenome(g) {
  return `${COLOR_NAMES[g.baseColor]} ${PATTERN_NAMES[g.pattern].toLowerCase()}` +
         (g.pattern !== 0 ? ` w/ ${COLOR_NAMES[g.accentColor].toLowerCase()}` : "") +
         `, ${TAIL_NAMES[g.tailType].toLowerCase()} tail`;
}

function breedSelected() {
  if (selected.length !== 2) return;
  const a = fishes.find(f => f.id === selected[0]);
  const b = fishes.find(f => f.id === selected[1]);
  if (!a || !b) return;
  const child = new Fish(
    breedGenomes(a.genome, b.genome),
    null,
    Math.max(a.generation, b.generation) + 1,
    (a.x + b.x) / 2,
    (a.y + b.y) / 2
  );
  fishes.push(child);
  setStatus(`${a.name} + ${b.name} produced ${child.name} (gen ${child.generation})!\n${describeGenome(child.genome)}`);
  selected.length = 0;
  refreshUI();
}

function releaseSelected() {
  if (!selected.length) return;
  const id = selected[selected.length - 1];
  const idx = fishes.findIndex(f => f.id === id);
  if (idx >= 0) {
    setStatus(`${fishes[idx].name} swims off to freedom. So long!`);
    fishes.splice(idx, 1);
  }
  selected.splice(selected.indexOf(id), 1);
  refreshUI();
}

function dropFood() {
  for (let i = 0; i < 6; i++) {
    food.push({ x: randRange(30, TANK_W - 30), y: randRange(2, 10), eaten: false });
  }
  setStatus("Food! The tank stirs...");
}

// --- save / load ------------------------------------------------------
const SAVE_KEY = "elfish-web-tank";
function saveTank() {
  const data = { fishes: fishes.map(f => f.serialize()), critters: critters.map(c => c.serialize()) };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    setStatus(`Tank saved (${fishes.length} fish).`);
  } catch (e) {
    setStatus("Could not save tank: " + e.message);
  }
}
function loadTank() {
  let raw;
  try { raw = localStorage.getItem(SAVE_KEY); } catch (e) { raw = null; }
  if (!raw) { setStatus("No saved tank found in this browser."); return; }
  try {
    const data = JSON.parse(raw);
    fishes.length = 0; selected.length = 0; critters.length = 0;
    for (const d of data.fishes) fishes.push(Fish.deserialize(d));
    for (const d of data.critters || []) critters.push(Critter.deserialize(d));
    setStatus(`Tank loaded (${fishes.length} fish, ${critters.length} critters).`);
    refreshUI();
  } catch (e) {
    setStatus("Saved tank was corrupt: " + e.message);
  }
}

// --- selection UI -----------------------------------------------------
canvas.addEventListener("pointerdown", (ev) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (ev.clientX - rect.left) * (TANK_W / rect.width);
  const my = (ev.clientY - rect.top) * (TANK_H / rect.height);
  // topmost fish under cursor (iterate from end = drawn last = on top)
  for (let i = fishes.length - 1; i >= 0; i--) {
    if (fishes[i].hitTest(mx, my)) {
      const id = fishes[i].id;
      const at = selected.indexOf(id);
      if (at >= 0) selected.splice(at, 1);       // click again to deselect
      else {
        selected.push(id);
        if (selected.length > 2) selected.shift();
      }
      refreshUI();
      return;
    }
  }
  // critters: click for a hello, right-click (below) to release
  for (let i = critters.length - 1; i >= 0; i--) {
    if (critters[i].hitTest(mx, my)) {
      const cr = critters[i];
      setStatus(`${cr.name} the ${CRITTER_INFO[cr.type].label} — ${CRITTER_INFO[cr.type].flavor}. (Right-click to release.)`);
      return;
    }
  }
  selected.length = 0;                            // click water to clear
  refreshUI();
});

canvas.addEventListener("contextmenu", (ev) => {
  ev.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (ev.clientX - rect.left) * (TANK_W / rect.width);
  const my = (ev.clientY - rect.top) * (TANK_H / rect.height);
  for (let i = critters.length - 1; i >= 0; i--) {
    if (critters[i].hitTest(mx, my)) {
      const cr = critters.splice(i, 1)[0];
      setStatus(`${cr.name} the ${CRITTER_INFO[cr.type].label} is rehomed to a friend's tank.`);
      return;
    }
  }
});

function portraitCanvas(fish, size) {
  const cv = document.createElement("canvas");
  cv.width = 128; cv.height = 80;
  cv.style.width = size + "px";
  const c = cv.getContext("2d");
  c.imageSmoothingEnabled = false;
  const s = fish.sprite;
  const sc = Math.min(120 / s.w, 72 / s.h, 1.5);
  c.save();
  c.translate(64, 40);
  c.scale(-sc, sc);                               // portraits face left, like a mugshot
  c.drawImage(s.frames[0], -s.anchorX, -s.anchorY);
  c.restore();
  return cv;
}

function refreshUI() {
  const cards = [document.getElementById("card0"), document.getElementById("card1")];
  for (let i = 0; i < 2; i++) {
    const card = cards[i];
    const fish = selected[i] !== undefined ? fishes.find(f => f.id === selected[i]) : null;
    if (!fish) {
      card.innerHTML = `<h3>Fish ${i ? "B" : "A"}</h3><span class="dim">${i ? "Click a second fish to enable breeding." : "Click a fish in the tank to select it."}</span>`;
      continue;
    }
    const g = fish.genome;
    card.innerHTML = "";
    card.appendChild(portraitCanvas(fish, 96));
    const h = document.createElement("h3");
    h.textContent = `${fish.name}  (gen ${fish.generation})`;
    card.appendChild(h);
    const info = document.createElement("div");
    info.innerHTML =
      `Body: ${COLOR_NAMES[g.baseColor]}, ${PATTERN_NAMES[g.pattern]}` +
      (g.pattern !== 0 ? ` (${COLOR_NAMES[g.accentColor]})` : "") + `<br>` +
      `Tail: ${TAIL_NAMES[g.tailType]}, Fins: ${COLOR_NAMES[g.finColor]}<br>` +
      `Size: ${g.bodyLen * SPRITE_SCALE}px &middot; Speed: ${g.speed.toFixed(1)} &middot; Age: ${Math.floor(fish.age)}s`;
    card.appendChild(info);
  }
  document.getElementById("btnBreed").disabled = selected.length !== 2;
  document.getElementById("btnRelease").disabled = selected.length === 0;
}

document.getElementById("btnNew").addEventListener("click", addRandomFish);
document.getElementById("btnBreed").addEventListener("click", breedSelected);
document.getElementById("btnFeed").addEventListener("click", dropFood);
document.getElementById("btnCritter").addEventListener("click", () => {
  addCritter(document.getElementById("critterSel").value);
});
document.getElementById("btnRelease").addEventListener("click", releaseSelected);
document.getElementById("btnSave").addEventListener("click", saveTank);
document.getElementById("btnLoad").addEventListener("click", loadTank);

// --- main loop --------------------------------------------------------
let lastT = performance.now();
function frame(now) {
  // clamp: first rAF timestamp can precede the performance.now() above
  const dt = Math.max(0, Math.min(0.1, (now - lastT) / 1000));
  lastT = now;
  const time = now / 1000;

  ctx.drawImage(bgCanvas, 0, 0);
  drawLightRays(time);
  drawPlants(time);

  for (const cr of critters) cr.update(dt);
  for (const cr of critters) cr.draw(ctx);

  updateFood(dt);

  for (const f of fishes) f.update(dt, food);
  // draw back-to-front by size so small fish appear in front
  const drawOrder = [...fishes].sort((a, b) => b.sprite.w * b.scale - a.sprite.w * a.scale);
  for (const f of drawOrder) f.draw(ctx);

  // selection brackets
  ctx.strokeStyle = "#fcfc54";
  ctx.lineWidth = 1;
  for (const id of selected) {
    const f = fishes.find(ff => ff.id === id);
    if (!f) continue;
    const hw = (f.sprite.w * f.scale) / 2 + 3, hh = (f.sprite.h * f.scale) / 2 + 3;
    const x = Math.round(f.x), y = Math.round(f.y), c = 8;
    ctx.beginPath();
    ctx.moveTo(x - hw, y - hh + c); ctx.lineTo(x - hw, y - hh); ctx.lineTo(x - hw + c, y - hh);
    ctx.moveTo(x + hw - c, y - hh); ctx.lineTo(x + hw, y - hh); ctx.lineTo(x + hw, y - hh + c);
    ctx.moveTo(x + hw, y + hh - c); ctx.lineTo(x + hw, y + hh); ctx.lineTo(x + hw - c, y + hh);
    ctx.moveTo(x - hw + c, y + hh); ctx.lineTo(x - hw, y + hh); ctx.lineTo(x - hw, y + hh - c);
    ctx.stroke();
  }

  updateBubbles(dt, time);
  requestAnimationFrame(frame);
}

// Stock the tank with a starter pair so there is something to look at.
addRandomFish();
addRandomFish();
addRandomFish();
addCritter("snail");
addCritter("shrimp");
setStatus("Welcome to El-Fish Web. Click two fish and press Breed Selected — or go fishing for more.\nA snail and a shrimp came with the tank; add more critters from the dropdown.");
requestAnimationFrame(frame);
</script>
</body>
</html>
